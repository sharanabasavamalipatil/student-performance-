# ─── Kubernetes Deployment Manifests ────────────────────────────────────────
# Apply with: kubectl apply -f k8s/

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: edupredict

---
# PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: edupredict
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB,       value: edupredict }
            - { name: POSTGRES_USER,     value: edupredict }
            - { name: POSTGRES_PASSWORD, value: edupredict_secret }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: edupredict
spec:
  selector: { app: postgres }
  ports:
    - port: 5432

---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: edupredict
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: edupredict
spec:
  selector: { app: redis }
  ports:
    - port: 6379

---
# FastAPI Backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: edupredict
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: edupredict-backend:latest
          ports:
            - containerPort: 8000
          env:
            - { name: DATABASE_URL, value: postgresql://edupredict:edupredict_secret@postgres:5432/edupredict }
            - { name: REDIS_URL,    value: redis://redis:6379/0 }
            - { name: JWT_SECRET,   valueFrom: { secretKeyRef: { name: jwt-secret, key: secret } } }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 500m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: edupredict
spec:
  selector: { app: backend }
  ports:
    - port: 8000
  type: LoadBalancer

---
# Next.js Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edupredict
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: edupredict-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - { name: NEXT_PUBLIC_API_URL, value: http://backend:8000 }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 250m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: edupredict
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer

---
# HPA - Auto-scale backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: edupredict
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# JWT Secret
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: edupredict
type: Opaque
stringData:
  secret: "change-this-to-a-strong-secret-in-production"

---
# PVC for Postgres
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-pvc
  namespace: edupredict
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
