version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edupredict
      POSTGRES_USER: edupredict
      POSTGRES_PASSWORD: edupredict_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edupredict"]
      interval: 10s; timeout: 5s; retries: 5

  # ── Redis (cache + Celery broker) ───────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s; timeout: 3s; retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://edupredict:edupredict_secret@postgres:5432/edupredict
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./backend:/app
      - ml_models:/app/models
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (background tasks) ────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://edupredict:edupredict_secret@postgres:5432/edupredict
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on: [redis, postgres]
    command: celery -A tasks worker --loglevel=info

  # ── Celery Beat (scheduler) ──────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on: [redis]
    command: celery -A tasks beat --loglevel=info

  # ── MLflow Tracking Server ───────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow

  # ── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on: [backend]

volumes:
  pgdata:
  ml_models:
  mlflow_data:
